<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAR-O Verification System</title>

<style>

body{
  margin:0;
  font-family: "Segoe UI", Arial;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#fff;
}

/* TOP BAR */
.topbar{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:18px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  letter-spacing:1px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* MAIN CARD */
.card{
  max-width:420px;
  margin:30px auto;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  width:80px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
}

/* TITLE */
.title{
  text-align:center;
  font-size:16px;
  font-weight:bold;
  margin-bottom:15px;
  color:#93c5fd;
}

/* ROWS */
.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:14px;
}

.label{
  color:#cbd5e1;
}

.value{
  font-weight:600;
  color:#fff;
}

/* STATUS BADGE */
.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:#fff;
}

/* NOT FOUND */
.error{
  text-align:center;
  padding:40px;
  color:#f87171;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">🚨 CAR-O VEHICLE VERIFICATION PORTAL</div>

<div class="card" id="output">Loading...</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

if(DATA && DATA[id]){

  let v = DATA[id];

  document.getElementById("output").innerHTML = `

    <div class="logo">
      <img src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png">
    </div>

    <div class="title">OFFICIAL VEHICLE RECORD</div>

    <div class="row"><span class="label">Vehicle</span><span class="value">${v.vehicle}</span></div>
    <div class="row"><span class="label">Owner</span><span class="value">${v.owner}</span></div>
    <div class="row"><span class="label">Mobile</span><span class="value">${v.mobile}</span></div>
    <div class="row"><span class="label">Address</span><span class="value">${v.address}</span></div>
    <div class="row"><span class="label">Insurance</span><span class="value">${v.insurance}</span></div>
    <div class="row">
      <span class="label">Status</span>
      <span class="badge">${v.status}</span>
    </div>

  `;

}else{
  document.getElementById("output").innerHTML = `
    <div class="error">❌ VEHICLE NOT FOUND</div>
  `;
}

</script>

</body>
</html>
