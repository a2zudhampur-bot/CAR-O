<!DOCTYPE html>
<html>
<head>
<title>CAR-O Verification</title>

<style>

body{
  margin:0;
  font-family: system-ui;
  background:#f1f5f9;
  color:#0f172a;
}

/* MAIN CARD */
.card{
  position:relative;
  max-width:520px;
  margin:30px auto;
  background:white;
  border-radius:18px;
  padding:25px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.12);
  border-top:6px solid #1d4ed8;
}

/* WATERMARK LOGO */
.card::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:300px;
  height:300px;
  transform:translate(-50%,-50%);
  background:url("https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png");
  background-size:contain;
  background-repeat:no-repeat;
  opacity:0.07;
  z-index:0;
}

/* CONTENT ABOVE WATERMARK */
.content{
  position:relative;
  z-index:1;
}

/* HEADER */
.header{
  text-align:center;
  font-weight:700;
  color:#1d4ed8;
  margin-bottom:10px;
  font-size:18px;
}

/* BIG LOGO */
.logo{
  text-align:center;
  margin:10px 0 15px;
}

.logo img{
  width:160px;
  height:160px;
  object-fit:cover;
  border-radius:50%;
  border:5px solid #1d4ed8;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h2{
  text-align:center;
  font-size:18px;
  margin-bottom:20px;
  color:#0f172a;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #e2e8f0;
  font-size:14px;
}

.label{
  font-weight:600;
  color:#475569;
}

.value{
  font-weight:500;
  color:#0f172a;
}

/* BADGE */
.badge{
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  color:white;
}

.active{
  background:#16a34a;
}

.inactive{
  background:#dc2626;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  margin-top:15px;
  color:#64748b;
}

</style>
</head>

<body>

<div class="card" id="output">
  <div class="content">
    Loading...
  </div>
</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

if(DATA[id]){
  let v = DATA[id];

  document.getElementById("output").innerHTML = `
    <div class="content">

      <div class="header">🚔 CAR-O VEHICLE VERIFICATION SYSTEM</div>

      <div class="logo">
        <img src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png">
      </div>

      <h2>OFFICIAL RECORD CERTIFICATE</h2>

      <div class="row"><span class="label">Vehicle</span><span class="value">${v.vehicle}</span></div>
      <div class="row"><span class="label">Owner</span><span class="value">${v.owner}</span></div>
      <div class="row"><span class="label">Mobile</span><span class="value">${v.mobile}</span></div>
      <div class="row"><span class="label">Address</span><span class="value">${v.address}</span></div>
      <div class="row"><span class="label">Insurance</span><span class="value">${v.insurance}</span></div>

      <div class="row">
        <span class="label">Status</span>
        <span class="badge ${v.status=='Active'?'active':'inactive'}">${v.status}</span>
      </div>

      <div class="footer">✔ System Generated Verified Document</div>

    </div>
  `;
}
else{
  document.getElementById("output").innerHTML =
  "<h3 style='text-align:center'>Vehicle Not Found</h3>";
}

</script>

</body>
</html>
