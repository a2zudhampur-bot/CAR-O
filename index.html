<!DOCTYPE html>
<html>
<head>
<title>CAR-O Verification</title>

<style>

body{
  margin:0;
  font-family: system-ui;
  background:#f1f5f9;
  color:#0f172a;
}

/* OUTER CARD */
.card{
  position:relative;
  max-width:520px;
  margin:30px auto;
  background:white;
  border-radius:18px;
  padding:25px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.12);
  border-top:6px solid #1d4ed8;
}

/* 🔻 FIXED WATERMARK (NO MOVEMENT EVER) */
.watermark{
  position:absolute;
  bottom:-60px;   /* 🔥 always bottom fixed */
  left:50%;
  transform:translateX(-50%);

  width:420px;
  height:420px;

  background:url("https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png");
  background-size:contain;
  background-repeat:no-repeat;

  opacity:0.22;
  filter:brightness(0.35);

  z-index:0;
  pointer-events:none;
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
}

/* HEADER */
.header{
  text-align:center;
  font-weight:700;
  color:#1d4ed8;
  margin-bottom:10px;
}

/* LOGO */
.logo{
  text-align:center;
  margin:10px 0 15px;
}

.logo img{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #1d4ed8;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h2{
  text-align:center;
  font-size:18px;
  margin-bottom:20px;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #e2e8f0;
}

.label{
  font-weight:600;
  color:#475569;
}

.value{
  font-weight:500;
}

/* 🔴 FIXED VERIFIED STAMP (ALWAYS SAME POSITION) */
.stamp{
  position:absolute;

  top:62%;   /* 🔥 fixed lower than center (~1cm down feel) */
  left:50%;

  transform:translate(-50%,-50%) rotate(-18deg);

  border:5px solid #dc2626;
  color:#dc2626;
  font-weight:900;
  font-size:22px;

  padding:12px 18px;
  border-radius:10px;

  background:rgba(255,255,255,0.9);

  z-index:1;

  box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* BADGE */
.badge{
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  color:white;
}

.active{ background:#16a34a; }
.inactive{ background:#dc2626; }

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  margin-top:15px;
  color:#64748b;
}

</style>
</head>

<body>

<div class="card">

  <!-- FIXED WATERMARK -->
  <div class="watermark"></div>

  <div class="content" id="output">
    Loading...
  </div>

</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

if(DATA[id]){
  let v = DATA[id];

  document.getElementById("output").innerHTML = `

    <div class="header">🚔 CAR-O VEHICLE VERIFICATION SYSTEM</div>

    <div class="logo">
      <img src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png">
    </div>

    <h2>OFFICIAL RECORD CERTIFICATE</h2>

    <div class="row"><span class="label">Vehicle</span><span class="value">${v.vehicle}</span></div>
    <div class="row"><span class="label">Owner</span><span class="value">${v.owner}</span></div>
    <div class="row"><span class="label">Mobile</span><span class="value">${v.mobile}</span></div>
    <div class="row"><span class="label">Address</span><span class="value">${v.address}</span></div>
    <div class="row"><span class="label">Insurance</span><span class="value">${v.insurance}</span></div>

    <div class="row">
      <span class="label">Status</span>
      <span class="badge ${v.status=='Active'?'active':'inactive'}">${v.status}</span>
    </div>

    <div class="footer">✔ System Generated Verified Document</div>

    <!-- FIXED STAMP (ALWAYS SAME POSITION) -->
    <div class="stamp">VERIFIED ✓</div>

  `;
}
else{
  document.getElementById("output").innerHTML =
  "<h3 style='text-align:center'>Vehicle Not Found</h3>";
}

</script>

</body>
</html>
