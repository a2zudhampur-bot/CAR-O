<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAR-O Verification</title>

<style>

body{
  margin:0;
  font-family: system-ui, Arial;
  background:#0b1220;
  color:#e5e7eb;
}

/* HEADER */
.header{
  background:#111827;
  padding:14px;
  text-align:center;
  font-weight:600;
  letter-spacing:0.5px;
  border-bottom:1px solid #1f2937;
}

/* CENTER WRAP */
.wrapper{
  max-width:520px;
  margin:30px auto;
  padding:0 15px;
}

/* CARD */
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:18px;
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:12px;
}

.logo img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #374151;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #1f2937;
}

.label{
  color:#9ca3af;
  font-size:13px;
}

.value{
  font-weight:500;
  color:#f3f4f6;
}

/* STATUS */
.badge{
  background:#16a34a;
  padding:3px 10px;
  border-radius:999px;
  font-size:12px;
  color:white;
}

/* ERROR */
.error{
  text-align:center;
  color:#ef4444;
  padding:40px;
}

</style>
</head>

<body>

<div class="header">CAR-O VEHICLE VERIFICATION SYSTEM</div>

<div class="wrapper">

<div id="output">Loading...</div>

</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

function render(v){

  document.getElementById("output").innerHTML = `
    <div class="card">

      <div class="logo">
        <img src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png"
        onerror="this.style.display='none'">
      </div>

      <div class="row"><div class="label">Vehicle</div><div class="value">${v.vehicle}</div></div>
      <div class="row"><div class="label">Owner</div><div class="value">${v.owner}</div></div>
      <div class="row"><div class="label">Mobile</div><div class="value">${v.mobile}</div></div>
      <div class="row"><div class="label">Address</div><div class="value">${v.address}</div></div>
      <div class="row"><div class="label">Insurance</div><div class="value">${v.insurance}</div></div>
      <div class="row"><div class="label">Status</div><div class="value"><span class="badge">${v.status}</span></div></div>

    </div>
  `;
}

if(typeof DATA !== "undefined" && DATA[id]){
  render(DATA[id]);
}else{
  document.getElementById("output").innerHTML =
  "<div class='error'>VEHICLE NOT FOUND</div>";
}

</script>

</body>
</html>
