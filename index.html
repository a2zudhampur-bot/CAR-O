<!DOCTYPE html>
<html>
<head>
<title>CAR-O Vehicle Verification</title>

<style>

body{
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg,#dbeafe,#eff6ff);
  padding:20px;
  color:#111827;
}

/* MAIN CARD */
.card{
  background:white;
  max-width:460px;
  margin:auto;
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
  border-top:6px solid #1d4ed8;
}

/* LOGO BIG HERO STYLE */
.logo{
  text-align:center;
  margin-top:10px;
  margin-bottom:15px;
}

.logo img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #1d4ed8;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h2{
  text-align:center;
  color:#1d4ed8;
  margin:10px 0 20px;
  font-size:20px;
  letter-spacing:1px;
}

/* ROW */
.row{
  padding:12px 10px;
  border-bottom:1px solid #e5e7eb;
  font-size:15px;
  display:flex;
  justify-content:space-between;
}

/* LABEL */
.label{
  font-weight:600;
  color:#374151;
}

/* VALUE */
.value{
  color:#111827;
  font-weight:500;
}

/* BADGE */
.badge{
  padding:6px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  color:white;
}

.active{
  background:#16a34a;
}

.inactive{
  background:#dc2626;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  margin-top:15px;
  color:#6b7280;
}

.headerTop{
  text-align:center;
  font-weight:700;
  margin-bottom:15px;
  color:#1e3a8a;
  font-size:18px;
}

</style>
</head>

<body>

<div class="card" id="output">

  <div class="headerTop">🚔 CAR-O VEHICLE VERIFICATION SYSTEM</div>

  <div class="logo">
    <img src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png">
  </div>

  Loading...

</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

if(DATA[id]){
  let v = DATA[id];

  document.getElementById("output").innerHTML = `
    <div class="headerTop">🚔 CAR-O VEHICLE VERIFICATION SYSTEM</div>

    <div class="logo">
      <img src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png">
    </div>

    <h2>OFFICIAL RECORD</h2>

    <div class="row"><span class="label">🚘 Vehicle</span><span class="value">${v.vehicle}</span></div>
    <div class="row"><span class="label">👤 Owner</span><span class="value">${v.owner}</span></div>
    <div class="row"><span class="label">📱 Mobile</span><span class="value">${v.mobile}</span></div>
    <div class="row"><span class="label">📍 Address</span><span class="value">${v.address}</span></div>
    <div class="row"><span class="label">🛡 Insurance</span><span class="value">${v.insurance}</span></div>

    <div class="row">
      <span class="label">📊 Status</span>
      <span class="badge ${v.status=='Active'?'active':'inactive'}">${v.status}</span>
    </div>

    <div class="footer">
      ✔ Verified by CAR-O System
    </div>
  `;
}
else{
  document.getElementById("output").innerHTML = "<h3 style='text-align:center'>Vehicle Not Found</h3>";
}

</script>

</body>
</html>
