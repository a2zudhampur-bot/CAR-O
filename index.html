<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAR-O Verification</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background:#050816;
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  background:#0f172a;
  font-weight:bold;
  letter-spacing:1px;
}

/* LOADING */
.loading{
  text-align:center;
  margin-top:80px;
  font-size:18px;
  animation: blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

/* CARD */
.card{
  max-width:420px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;

  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:0 0 20px rgba(0,255,200,0.2);

  animation: fadeIn 0.8s ease-in;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* ROW */
.row{
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* LABEL */
.label{
  color:#38bdf8;
  font-weight:bold;
}

/* STATUS */
.status{
  color:#00ff99;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">🚨 CAR-O VERIFICATION SYSTEM</div>

<div id="output" class="loading">🔍 Verifying Vehicle...</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

setTimeout(()=>{

  if(DATA && DATA[id]){

    let v = DATA[id];

    document.getElementById("output").innerHTML = `
      <div class="card">

        <div class="row"><span class="label">Vehicle:</span> ${v.vehicle}</div>
        <div class="row"><span class="label">Owner:</span> ${v.owner}</div>
        <div class="row"><span class="label">Mobile:</span> ${v.mobile}</div>
        <div class="row"><span class="label">Address:</span> ${v.address}</div>
        <div class="row"><span class="label">Insurance:</span> ${v.insurance}</div>
        <div class="row"><span class="label">Status:</span> <span class="status">${v.status}</span></div>

      </div>
    `;

  } else {
    document.getElementById("output").innerHTML =
    "<h3 style='text-align:center;color:red'>❌ VEHICLE NOT FOUND</h3>";
  }

}, 1200); // loading animation delay

</script>

</body>
</html>
