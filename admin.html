```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAR-O Admin Panel</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  padding:20px;
  color:white;
}

.box{
  max-width:750px;
  margin:auto;
  background:white;
  color:black;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h2{
  text-align:center;
  color:#1e3a8a;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  box-sizing:border-box;
  border:1px solid #cbd5e1;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  cursor:pointer;
  color:white;
  font-size:15px;
  border-radius:8px;
}

.generate{
  background:#16a34a;
}

.copy{
  background:#dc2626;
}

.print{
  background:#2563eb;
}

#result{
  margin-top:15px;
  background:#f8fafc;
  padding:15px;
  border-radius:10px;
  word-break:break-word;
}

#qr{
  text-align:center;
  margin-top:20px;
}

pre{
  background:#eef2ff;
  padding:12px;
  border-radius:8px;
  overflow:auto;
}

</style>
</head>

<body>

<div class="box">

<h2>🚔 CAR-O Admin Panel</h2>

<input id="vehicle" placeholder="Vehicle Number">
<input id="owner" placeholder="Owner Name">
<input id="mobile" placeholder="Mobile Number">
<input id="address" placeholder="Address">
<input id="insurance" placeholder="Insurance">
<input id="status" placeholder="Status (Active/Inactive)">

<button class="generate" onclick="generate()">
Generate Vehicle Record
</button>

<div id="result"></div>

<div id="qr"></div>

<button class="copy" onclick="copyLink()">
Copy Verification Link
</button>

<button class="print" onclick="window.print()">
Print QR
</button>

</div>

<script>

let counter = 4;
let currentLink = "";

function generate(){

let id = "V" + String(counter).padStart(3,"0");

currentLink =
"https://a2zudhampur-bot.github.io/CAR-O/?id=" + id;

let entry = `"${id}": {
  vehicle: "${vehicle.value}",
  owner: "${owner.value}",
  mobile: "${mobile.value}",
  address: "${address.value}",
  insurance: "${insurance.value}",
  status: "${status.value}"
},`;

document.getElementById("result").innerHTML =

"<h3>Generated Record</h3>" +

"<b>ID:</b> " + id +

"<br><b>Vehicle:</b> " + vehicle.value +

"<br><b>Owner:</b> " + owner.value +

"<br><br><b>Verification Link:</b><br>" +

currentLink +

"<br><br><b>DATA.JS Entry:</b>" +

"<pre>" + entry + "</pre>";

document.getElementById("qr").innerHTML =

'<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' +
encodeURIComponent(currentLink) +
'">';

counter++;

}

function copyLink(){

if(!currentLink){
  alert("Generate record first");
  return;
}

navigator.clipboard.writeText(currentLink);
alert("Verification link copied");

}

</script>

</body>
</html>
```
