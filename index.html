<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAR-O Verification</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

/* HEADER */
.header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.95);
  color:#111;
  max-width:420px;
  margin:20px auto;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* ROW */
.row{
  padding:10px 0;
  border-bottom:1px solid #eee;
  font-size:15px;
}

.label{
  font-weight:bold;
  color:#374151;
}

/* STATUS */
.status{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  background:green;
  color:#fff;
  font-size:12px;
}

.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  width:70px;
}

</style>
</head>

<body>

<div class="header">🚗 CAR-O VEHICLE VERIFICATION</div>

<div class="card" id="output">
  Loading...
</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

if(DATA && DATA[id]){

  let v = DATA[id];

  document.getElementById("output").innerHTML = `

    <div class="logo">
      <img src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png">
    </div>

    <div class="row"><span class="label">🚘 Vehicle:</span> ${v.vehicle}</div>
    <div class="row"><span class="label">👤 Owner:</span> ${v.owner}</div>
    <div class="row"><span class="label">📱 Mobile:</span> ${v.mobile}</div>
    <div class="row"><span class="label">📍 Address:</span> ${v.address}</div>
    <div class="row"><span class="label">🛡 Insurance:</span> ${v.insurance}</div>

    <div class="row">
      <span class="label">Status:</span>
      <span class="status">${v.status}</span>
    </div>

  `;

}else{
  document.getElementById("output").innerHTML =
  "<h3 style='text-align:center'>❌ Vehicle Not Found</h3>";
}

</script>

</body>
</html>
