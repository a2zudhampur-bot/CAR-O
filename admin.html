<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAR-O Admin Panel</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  padding:20px;
  color:white;
}

.box{
  max-width:800px;
  margin:auto;
  background:white;
  color:black;
  padding:25px;
  border-radius:15px;
  box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h2{
  text-align:center;
  color:#1d4ed8;
}

.idbox{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  color:#16a34a;
  margin-bottom:15px;
  padding:10px;
  background:#ecfdf5;
  border-radius:10px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  box-sizing:border-box;
  border:1px solid #cbd5e1;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  cursor:pointer;
  color:white;
  font-size:15px;
  border-radius:8px;
}

.generate{
  background:#16a34a;
}

.copy{
  background:#dc2626;
}

.print{
  background:#2563eb;
}

#result{
  margin-top:15px;
  background:#f8fafc;
  padding:15px;
  border-radius:10px;
}

#qr{
  text-align:center;
  margin-top:20px;
}

pre{
  background:#eef2ff;
  padding:12px;
  border-radius:8px;
  overflow:auto;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="box">

<h2>🚔 CAR-O Admin Panel</h2>

<div class="idbox" id="nextId">
Loading Next ID...
</div>

<input id="vehicle" placeholder="Vehicle Number">
<input id="owner" placeholder="Owner Name">
<input id="mobile" placeholder="Mobile Number">
<input id="address" placeholder="Address">
<input id="insurance" placeholder="Insurance">
<input id="status" value="Active" placeholder="Status">

<button class="generate" onclick="generate()">
Generate Vehicle Record
</button>

<div id="result"></div>

<div id="qr"></div>

<button class="copy" onclick="copyLink()">
Copy Verification Link
</button>

<button class="print" onclick="window.print()">
Print QR
</button>

</div>

<script src="data.js"></script>

<script>

let currentLink = "";
let nextNumber = 1;

function calculateNextId(){

  let max = 0;

  for(let key in DATA){

    let num = parseInt(key.replace("V",""));

    if(num > max){
      max = num;
    }
  }

  nextNumber = max + 1;

  document.getElementById("nextId").innerHTML =
  "Next Vehicle ID: V" + String(nextNumber).padStart(3,"0");
}

calculateNextId();

function generate(){

let id = "V" + String(nextNumber).padStart(3,"0");

currentLink =
"https://a2zudhampur-bot.github.io/CAR-O/?id=" + id;

let entry = `"${id}": {
  vehicle: "${vehicle.value}",
  owner: "${owner.value}",
  mobile: "${mobile.value}",
  address: "${address.value}",
  insurance: "${insurance.value}",
  status: "${status.value}"
},`;

document.getElementById("result").innerHTML =

"<h3>Generated Record</h3>" +

"<b>ID:</b> " + id +

"<br><b>Vehicle:</b> " + vehicle.value +

"<br><b>Owner:</b> " + owner.value +

"<br><br><b>Verification Link:</b><br>" +

currentLink +

"<br><br><b>Copy this into data.js:</b>" +

"<pre>" + entry + "</pre>";

document.getElementById("qr").innerHTML =

'<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' +
encodeURIComponent(currentLink) +
'">';

nextNumber++;

document.getElementById("nextId").innerHTML =
"Next Vehicle ID: V" + String(nextNumber).padStart(3,"0");

}

function copyLink(){

if(!currentLink){
  alert("Generate record first");
  return;
}

navigator.clipboard.writeText(currentLink);

alert("Verification link copied");

}

</script>

</body>
</html>
