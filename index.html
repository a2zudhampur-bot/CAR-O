<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAR-O Dashboard</title>

<style>

body{
  margin:0;
  font-family: system-ui;
  background:#0a0f1c;
  color:#e5e7eb;
}

/* TOP BAR */
.topbar{
  background:#111827;
  padding:14px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #1f2937;
}

/* WRAPPER */
.container{
  max-width:800px;
  margin:20px auto;
  padding:10px;
}

/* DASHBOARD CARD */
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:15px;
}

/* HEADER SECTION */
.headerBox{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:15px;
}

/* LOGO */
.logo{
  width:55px;
  height:55px;
  border-radius:50%;
  border:2px solid #374151;
  object-fit:cover;
}

/* TITLE */
.title{
  font-size:16px;
  font-weight:600;
}

/* TABLE STYLE */
.table{
  width:100%;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #1f2937;
}

.label{
  color:#9ca3af;
}

.value{
  font-weight:500;
}

.badge{
  background:#16a34a;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}

/* NOT FOUND */
.error{
  text-align:center;
  color:#ef4444;
  padding:40px;
}

</style>
</head>

<body>

<div class="topbar">🚔 CAR-O VEHICLE DASHBOARD</div>

<div class="container">

<div id="output">Loading...</div>

</div>

<script src="data.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

function render(v){

  document.getElementById("output").innerHTML = `
    <div class="card">

      <div class="headerBox">

        <img class="logo"
          src="https://raw.githubusercontent.com/a2zudhampur-bot/CAR-O/main/CAR-O.png"
          onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg'">

        <div class="title">OFFICIAL VEHICLE RECORD</div>

      </div>

      <div class="row"><div class="label">Vehicle</div><div class="value">${v.vehicle}</div></div>
      <div class="row"><div class="label">Owner</div><div class="value">${v.owner}</div></div>
      <div class="row"><div class="label">Mobile</div><div class="value">${v.mobile}</div></div>
      <div class="row"><div class="label">Address</div><div class="value">${v.address}</div></div>
      <div class="row"><div class="label">Insurance</div><div class="value">${v.insurance}</div></div>
      <div class="row"><div class="label">Status</div><div class="value"><span class="badge">${v.status}</span></div></div>

    </div>
  `;
}

if(typeof DATA !== "undefined" && DATA[id]){
  render(DATA[id]);
}else{
  document.getElementById("output").innerHTML =
  "<div class='error'>VEHICLE NOT FOUND</div>";
}

</script>

</body>
</html>
