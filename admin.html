<!DOCTYPE html>
<html>
<head>
  <title>CAR-O Admin Panel</title>
  <style>
    body{font-family:Arial;background:#0f172a;color:white;padding:20px;}
    .box{background:white;color:black;padding:20px;max-width:500px;margin:auto;border-radius:12px;}
    input{width:100%;padding:10px;margin:5px 0;}
    button{width:100%;padding:10px;background:green;color:white;border:none;}
    .idbox{font-weight:bold;color:blue;margin-bottom:10px;}
    pre{background:#eee;padding:10px;}
  </style>
</head>
<body>

<div class="box">
  <h2>🚗 CAR-O Admin Panel</h2>

  <div class="idbox" id="autoId">Loading ID...</div>

  <input id="vehicle" placeholder="Vehicle No">
  <input id="owner" placeholder="Owner">
  <input id="mobile" placeholder="Mobile">
  <input id="address" placeholder="Address">
  <input id="insurance" placeholder="Insurance">
  <input id="status" placeholder="Status">

  <button onclick="generate()">Generate Entry</button>

  <pre id="out"></pre>
</div>

<script>
// dummy existing data (future: GitHub से load होगा)
let DATA = {
  "V001": {},
  "V002": {}
};

// AUTO ID generator
function getNextId(){
  let keys = Object.keys(DATA);
  let max = 0;

  keys.forEach(k=>{
    let num = parseInt(k.replace("V",""));
    if(num > max) max = num;
  });

  let next = max + 1;
  return "V" + String(next).padStart(3,"0");
}

// set ID on load
let newId = getNextId();
document.getElementById("autoId").innerText = "New Vehicle ID: " + newId;

// generate entry
function generate(){
  let id = getNextId();

  let obj = `
"${id}": {
  vehicle: "${vehicle.value}",
  owner: "${owner.value}",
  mobile: "${mobile.value}",
  address: "${address.value}",
  insurance: "${insurance.value}",
  status: "${status.value}"
},`;

  document.getElementById("out").innerText = obj;

  // reset form
  vehicle.value = "";
  owner.value = "";
  mobile.value = "";
  address.value = "";
  insurance.value = "";
  status.value = "";

  document.getElementById("autoId").innerText = "Next Vehicle ID: " + getNextId();
}
</script>

</body>
</html>
