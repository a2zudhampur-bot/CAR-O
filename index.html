<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAR-O Vehicle Verification</title>

<style>

body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#f1f5f9;
}

.card{
  position:relative;
  width:520px;
  margin:30px auto;
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.12);
  border-top:6px solid #1d4ed8;
}

.layer{
  position:relative;
  padding:25px;
  z-index:2;
}

.watermark{
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  width:420px;
  height:420px;
  background:url("CAR-O.png") center/contain no-repeat;
  opacity:.22;
  filter:brightness(.35);
  z-index:0;
  pointer-events:none;
}

.header{
  text-align:center;
  font-weight:700;
  color:#1d4ed8;
  margin-bottom:10px;
}

.logo{
  text-align:center;
  margin:10px 0 15px;
}

.logo img{
  width:160px;
  height:160px;
  border-radius:50%;
  border:5px solid #1d4ed8;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-size:18px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #e2e8f0;
  font-size:14px;
}

.label{
  font-weight:600;
  color:#475569;
}

.value{
  font-weight:500;
  text-align:right;
}

.stamp-layer{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
  pointer-events:none;
}

.stamp{
  border:5px solid #dc2626;
  color:#dc2626;
  font-weight:900;
  font-size:22px;
  padding:12px 18px;
  border-radius:10px;
  background:rgba(255,255,255,.92);
  transform:rotate(-18deg);
}

.badge{
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  color:white;
}

.active{
  background:#16a34a;
}

.inactive{
  background:#dc2626;
}

.footer{
  text-align:center;
  font-size:12px;
  margin-top:15px;
  color:#64748b;
}

.notfound{
  text-align:center;
  padding:50px 20px;
}

</style>
</head>

<body>

<div class="card">

  <div class="watermark"></div>

  <div class="stamp-layer">
    <div class="stamp">VERIFIED ✓</div>
  </div>

  <div class="layer" id="output">
    Loading...
  </div>

</div>

<script src="data.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

function showVehicle(v){

document.getElementById("output").innerHTML = `

<div class="header">
🚔 CAR-O VEHICLE VERIFICATION SYSTEM
</div>

<div class="logo">
<img src="CAR-O.png" alt="CAR-O">
</div>

<h2>OFFICIAL RECORD CERTIFICATE</h2>

<div class="row">
<span class="label">Vehicle</span>
<span class="value">${v.vehicle}</span>
</div>

<div class="row">
<span class="label">Owner</span>
<span class="value">${v.owner}</span>
</div>

<div class="row">
<span class="label">Mobile</span>
<span class="value">${v.mobile}</span>
</div>

<div class="row">
<span class="label">Address</span>
<span class="value">${v.address}</span>
</div>

<div class="row">
<span class="label">Insurance</span>
<span class="value">${v.insurance}</span>
</div>

<div class="row">
<span class="label">Status</span>
<span class="badge ${v.status === 'Active' ? 'active' : 'inactive'}">
${v.status}
</span>
</div>

<div class="footer">
✔ System Generated Verified Document
</div>

`;

}

if(id && window.DATA && window.DATA[id]){
  showVehicle(window.DATA[id]);
}else{
  document.getElementById("output").innerHTML = `
    <div class="notfound">
      <h2>❌ Vehicle Not Found</h2>
      <p>ID: ${id || "No ID Provided"}</p>
    </div>
  `;
}

</script>

</body>
</html>
