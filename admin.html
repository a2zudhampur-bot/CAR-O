<!DOCTYPE html>
<html>
<head>
  <title>CAR-O Admin Panel</title>

  <style>
    body{font-family:Arial;background:#0f172a;color:white;padding:20px;}
    .box{background:white;color:black;padding:20px;max-width:500px;margin:auto;border-radius:12px;}
    input{width:100%;padding:10px;margin:5px 0;}
    button{width:100%;padding:10px;background:green;color:white;border:none;}
    .idbox{font-weight:bold;color:blue;margin-bottom:10px;}
    pre{background:#eee;padding:10px;}

    #qrcode{
      display:flex;
      justify-content:center;
      margin-top:15px;
    }
  </style>

  <!-- QR LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="box">
  <h2>🚗 CAR-O Admin Panel</h2>

  <div class="idbox" id="autoId">Loading ID...</div>

  <input id="vehicle" placeholder="Vehicle No">
  <input id="owner" placeholder="Owner">
  <input id="mobile" placeholder="Mobile">
  <input id="address" placeholder="Address">
  <input id="insurance" placeholder="Insurance">
  <input id="status" placeholder="Status">

  <button onclick="generate()">Generate Entry + QR</button>

  <!-- QR DISPLAY -->
  <div id="qrcode"></div>

  <pre id="out"></pre>
</div>

<script>

// dummy existing data
let DATA = {
  "V001": {},
  "V002": {}
};

// AUTO ID
function getNextId(){
  let keys = Object.keys(DATA);
  let max = 0;

  keys.forEach(k=>{
    let num = parseInt(k.replace("V",""));
    if(num > max) max = num;
  });

  return "V" + String(max + 1).padStart(3,"0");
}

// show next ID
document.getElementById("autoId").innerText =
"Next Vehicle ID: " + getNextId();

// QR GENERATOR
function generateQR(id){

  let url = "https://your-site.com/verify.html?id=" + id;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 150,
    height: 150
  });
}

// GENERATE ENTRY
function generate(){

  let id = getNextId();

  let obj = `
"${id}": {
  vehicle: "${vehicle.value}",
  owner: "${owner.value}",
  mobile: "${mobile.value}",
  address: "${address.value}",
  insurance: "${insurance.value}",
  status: "${status.value}"
},`;

  document.getElementById("out").innerText = obj;

  // QR CALL 🔥
  generateQR(id);

  // reset form
  vehicle.value = "";
  owner.value = "";
  mobile.value = "";
  address.value = "";
  insurance.value = "";
  status.value = "";

  document.getElementById("autoId").innerText =
  "Next Vehicle ID: " + getNextId();
}

</script>

</body>
</html>
