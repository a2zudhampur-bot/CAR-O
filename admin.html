<!DOCTYPE html>
<html>
<head>
<title>CAR-O Admin</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px;}
.box{background:white;color:black;padding:20px;max-width:500px;margin:auto;border-radius:10px;}
input{width:100%;padding:10px;margin:5px 0;}
button{width:100%;padding:10px;background:green;color:white;border:none;}
pre{background:#eee;padding:10px;color:black;}
</style>
</head>

<body>

<div class="box">
<h2>CAR-O Admin</h2>

<input id="vehicle" placeholder="Vehicle">
<input id="owner" placeholder="Owner">

<button onclick="generate()">Generate</button>

<pre id="out"></pre>

</div>

<script>

function generate(){

let id = "V" + Math.floor(Math.random()*1000);

document.getElementById("out").innerText =
id + "\nVehicle: " + vehicle.value + "\nOwner: " + owner.value;

}

</script>

</body>
</html>
